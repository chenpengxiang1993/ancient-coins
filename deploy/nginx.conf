server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coins.family-chen.com;

    ssl_certificate /etc/nginx/ssl/coins.family-chen.com/coins.family-chen.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/coins.family-chen.com/coins.family-chen.com.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location / {
        root /var/www/frontend/coins;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        root /var/www/frontend/coins;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
