server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coins.family-chen.com;

    ssl_certificate /etc/nginx/ssl/coins.family-chen.com/coins.family-chen.com_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/coins.family-chen.com/coins.family-chen.com.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    root /var/www/frontend/coins;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
      text/plain
      text/css
      text/xml
      application/json
      application/javascript
      application/xml
      image/svg+xml;

    gzip_static on;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /data/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
